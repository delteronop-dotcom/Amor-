<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ecos Eternos: Angeles 💌</title>
    <style>
        body, html { margin: 0; overflow: hidden; background: #050505; font-family: 'serif'; touch-action: none; }
        #ui-layer { position: absolute; width: 100%; height: 100%; z-index: 10; pointer-events: none; color: white; }
        
        #intro-screen { 
            position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #2a0a2e, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; pointer-events: auto; z-index: 20;
        }

        #hud { position: absolute; top: 20px; width: 100%; text-align: center; opacity: 0; transition: 1s; }
        #objective { font-size: 1.2em; color: #ff3366; text-shadow: 0 0 10px #fff; font-weight: bold; }
        #frase { font-size: 0.8em; color: #aaa; margin-top: 5px; font-style: italic; }

        #controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: center; align-items: center; pointer-events: auto; opacity: 0; }
        #action-btn { width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid #ff3366; color: white; font-weight: bold; box-shadow: 0 0 30px #ff3366; cursor: pointer;}
        
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="intro-screen">
            <h1 style="letter-spacing: 5px;">REINO DEL RÍO ETERNO</h1>
            <p>Un viaje sin fin para Angeles</p>
            <button id="start-btn" style="padding: 15px 40px; background: #ff3366; color: white; border: none; border-radius: 30px; font-weight: bold;">ENTRAR AL VIAJE</button>
        </div>

        <div id="hud">
            <div id="objective">Diamantes Recolectados: 0</div>
            <p id="frase">"Tu mirada encendió el universo..."</p>
        </div>

        <div id="controls">
            <button id="action-btn">PULSO</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, heart, diamantes = [], petalos = [], score = 0;
        let river, riverMaterial;
        let moveDirection = 0; // -1 (izq), 1 (der), 0 (quieto)
        const heartSpeed = 0.15;
        const riverSpeed = 0.1;
        let pLight;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0a0510, 0.04);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 10);
            camera.lookAt(0, 0, -10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // Luces
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            pLight = new THREE.PointLight(0xff3366, 20, 100);
            pLight.position.set(0, 5, 5);
            scene.add(pLight);

            // --- PERSONAJE: CORAZÓN ---
            const heartShape = new THREE.Shape();
            heartShape.moveTo( 0, 10 );
            heartShape.bezierCurveTo( 10, 20, 20, 10, 20, 0 );
            heartShape.bezierCurveTo( 20, -10, 10, -18, 0, -28 );
            heartShape.bezierCurveTo( -10, -18, -20, -10, -20, 0 );
            heartShape.bezierCurveTo( -20, 10, -10, 20, 0, 10 );

            const heartGeo = new THREE.ExtrudeGeometry(heartShape, { depth: 4, bevelEnabled: true, bevelSize: 1, bevelThickness: 1 });
            const heartMat = new THREE.MeshPhongMaterial({ color: 0xff1144, emissive: 0x440011 });
            heart = new THREE.Mesh(heartGeo, heartMat);
            heart.scale.set(0.04, 0.04, 0.04);
            heart.rotation.x = Math.PI; 
            heart.rotation.z = Math.PI;
            heart.position.set(0, 0.8, 0); // Ligeramente elevado
            scene.add(heart);

            // --- EL RÍO ETERNO (Piso) ---
            const riverGeo = new THREE.PlaneGeometry(10, 500, 1, 10);
            riverMaterial = new THREE.MeshStandardMaterial({
                color: 0x1a0a2e,
                roughness: 0,
                metalness: 0.5,
                emissive: 0x00ffff,
                emissiveIntensity: 0.1,
                map: new THREE.TextureLoader().load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/lava/lavatile.jpg')
            });
            riverMaterial.map.wrapS = THREE.RepeatWrapping;
            riverMaterial.map.wrapT = THREE.RepeatWrapping;
            riverMaterial.map.repeat.set(1, 10);
            river = new THREE.Mesh(riverGeo, riverMaterial);
            river.rotation.x = -Math.PI / 2;
            river.position.z = -100;
            scene.add(river);

            // --- BORDES DEL RÍO (Paredes) ---
            const edgeGeo = new THREE.CylinderGeometry(0.2, 0.2, 500, 32);
            const edgeMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff });
            
            const edgeL = new THREE.Mesh(edgeGeo, edgeMat);
            edgeL.rotation.x = -Math.PI / 2;
            edgeL.position.set(-5, 0.2, -100);
            scene.add(edgeL);

            const edgeR = new THREE.Mesh(edgeGeo, edgeMat);
            edgeR.rotation.x = -Math.PI / 2;
            edgeR.position.set(5, 0.2, -100);
            scene.add(edgeR);

            setupControls();
            setupSorpresas();
            animate();
        }

        function setupSorpresas() {
            // Generar Diamantes a lo largo del río
            for(let i=0; i<100; i++) {
                const geo = new THREE.OctahedronGeometry(0.5, 0);
                const mat = new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 1 });
                const diamante = new THREE.Mesh(geo, mat);
                
                // Alineación Perfecta: Solo en el rango X del río (-4.5 a 4.5)
                diamante.position.set(
                    (Math.random()-0.5)*9, 
                    1, 
                    -i * 5 - 10 
                );
                scene.add(diamante);
                diamantes.push(diamante);
            }

            // Generar Lluvia de Pétalos (Sorpresa Visual)
            for(let i=0; i<300; i++) {
                const geo = new THREE.PlaneGeometry(0.2, 0.2);
                const mat = new THREE.MeshBasicMaterial({ color: 0xff3366, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
                const petalo = new THREE.Mesh(geo, mat);
                petalo.position.set(
                    (Math.random()-0.5)*15, 
                    Math.random()*20, 
                    Math.random()*-200 
                );
                scene.add(petalo);
                petalos.push(petalo);
            }
        }

        function setupControls() {
            const btn = document.getElementById('action-btn');

            // Controles de inclinación del celular (para moverse izq/der)
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (e) => {
                    let beta = e.beta; // Inclinación adelante/atrás (-180 a 180)
                    if(beta > 1) moveDirection = 1;
                    else if(beta < -1) moveDirection = -1;
                    else moveDirection = 0;
                });
            }

            // Respaldo Táctil (si no funciona inclinación)
            window.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                if(touch.clientX < window.innerWidth / 2) moveDirection = -1;
                else moveDirection = 1;
            });
            window.addEventListener('touchend', () => moveDirection = 0);
            
            // Botón PULSO
            btn.addEventListener('touchstart', () => {
                if(navigator.vibrate) navigator.vibrate(60);
                pLight.intensity = 50; // Destello de luz
                setTimeout(() => pLight.intensity = 20, 200);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Movimiento del Corazón
            if(heart) {
                heart.position.x += moveDirection * heartSpeed;
                heart.position.x = Math.max(Math.min(heart.position.x, 4.5), -4.5); // Limitar al río
                heart.rotation.y += 0.02;
                
                // Efecto Latido suave
                const s = 0.04 + Math.sin(Date.now() * 0.005) * 0.002;
                heart.scale.set(s, s, s);
            }

            // Movimiento del Río (Generación Infinita)
            if(river && riverMaterial) {
                riverMaterial.map.offset.y -= riverSpeed / 10;
                
                diamantes.forEach(d => {
                    d.position.z += riverSpeed * 5; // Mover diamantes hacia el jugador
                    d.rotation.y += 0.05;
                    
                    // Colisión Infalible: Todos en el mismo Z, solo importa X
                    if(Math.abs(d.position.z - heart.position.z) < 1 && Math.abs(d.position.x - heart.position.x) < 1.5) {
                        scene.remove(d);
                        const index = diamantes.indexOf(d);
                        diamantes.splice(index, 1);
                        score++;
                        if(navigator.vibrate) navigator.vibrate(80);
                        document.getElementById('objective').innerText = `Diamantes: ${score}`;
                    }
                    
                    // Reciclar diamantes pasados (para infinito)
                    if(d.position.z > 10) {
                        d.position.z = -200;
                        d.position.x = (Math.random()-0.5)*9;
                    }
                });
            }

            // Animación de Pétalos
            petalos.forEach(p => {
                p.position.y -= 0.05;
                p.position.z += 0.1;
                p.rotation.x += 0.01;
                p.rotation.y += 0.01;
                
                // Reciclar pétalos
                if(p.position.y < -1) {
                    p.position.y = 20;
                    p.position.x = (Math.random()-0.5)*15;
                    p.position.z = Math.random()*-200;
                }
            });

            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('hud').style.opacity = '1';
            document.getElementById('controls').style.opacity = '1';
            init();
        });
    </script>
</body>
</html>
